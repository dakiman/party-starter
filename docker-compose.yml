# Project name pinned so the bundled MySQL volume survives folder renames.
name: party-starter

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: party-starter
    init: true
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      DB_HOST: mysql:3306
    ports:
      - "${APP_PORT:-8093}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health || curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: party-starter-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-spring_app}
    # Loopback-only mapping so a host JVM (`./mvnw spring-boot:run`) can reach MySQL
    # at localhost:3308. Not LAN-exposed -> no UFW change needed. 3307 is taken by another app
    # per /home/dakiman/dakis-server/PORTS.md, so we use 3308.
    ports:
      - "127.0.0.1:3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
